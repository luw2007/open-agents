services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: open_agents
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/open_agents
      REDIS_URL: redis://redis:6379
      JWE_SECRET: ${JWE_SECRET:-change-me-generate-with-openssl-rand-base64-32}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-generate-with-openssl-rand-hex-32}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      # GitLab OAuth（必填）
      GITLAB_URL: ${GITLAB_URL:-}
      GITLAB_CLIENT_ID: ${GITLAB_CLIENT_ID:-}
      GITLAB_CLIENT_SECRET: ${GITLAB_CLIENT_SECRET:-}
      # GitLab Bot（必填，用于仓库操作）
      GITLAB_BOT_ACCESS_TOKEN: ${GITLAB_BOT_ACCESS_TOKEN:-}
      GITLAB_WEBHOOK_SECRET: ${GITLAB_WEBHOOK_SECRET:-}
      # 可选: GitHub 集成
      NEXT_PUBLIC_GITHUB_CLIENT_ID: ${NEXT_PUBLIC_GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      NEXT_PUBLIC_GITHUB_APP_SLUG: ${NEXT_PUBLIC_GITHUB_APP_SLUG:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      # 可选: 开发模式
      DEV_BYPASS_AUTH: ${DEV_BYPASS_AUTH:-}
      ENABLE_DEV_TASKS: ${ENABLE_DEV_TASKS:-}

volumes:
  pgdata:
